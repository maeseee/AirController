<div class="dashboard-container">
  <header class="header-content">
    <img ngSrc="assets/Logo.png" alt="Logo" class="logo" height="1024" width="1024" src="">
    <h1>Fresh Air System</h1>
  </header>

  @if (viewModel(); as data) {

  <app-dashboard-section
    title="System"
    [info]="data.systemCardViews.info"
    [cards]="data.systemCardViews.cards"
    [activeGraphMetric]="systemGraphProfile()"
    (cardSelected)="setSystemGraphProfile('airflow')">
  </app-dashboard-section>

  <app-dashboard-section
    title="Indoor Sensors"
    location="indoor"
    [info]="data.indoorCardViews.info"
    [cards]="data.indoorCardViews.cards"
    [activeGraphMetric]="indoorGraphProfile()"
    (cardSelected)="setIndoorGraphProfile($event)">
  </app-dashboard-section>

  <app-dashboard-section
    title="Outdoor Sensors"
    location="outdoor"
    [info]="data.outdoorCardViews.info"
    [cards]="data.outdoorCardViews.cards"
    [activeGraphMetric]="outdoorGraphProfile()"
    (cardSelected)="setOutdoorGraphProfile($event)">
  </app-dashboard-section>

  <app-dashboard-section title="Confidence" [cards]="data.confidenceCardViews.cards"></app-dashboard-section>
  <app-dashboard-section title="Statistics" [cards]="data.statisticsCardViews.cards"></app-dashboard-section>

  <h3>Manual overrides</h3>
  <override-airflow-state></override-airflow-state>
  } @else if (hasError()) {
  <div class="error">
    <p>Failed to load data.</p>
    <button class="refresh-btn" (click)="refresh()">Retry</button>
  </div>
  } @else {
  <div class="loader"><p>Fetching climate data...</p></div>
  }

</div>
