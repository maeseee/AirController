<h3>{{ title }}</h3>
<div>{{ info }}</div>
<section class="card-grid">
  @for (card of cards; track card.name) {
    <app-metric-card
      [label]="card.name"
      [value]="card.value"
      [unit]="card.unit"
      (click)="onCardClick(card.name)">
    </app-metric-card>
  } @empty {
    <p>No cards found in this group.</p>
  }
</section>

@if (activeGraphMetric) {
  <div class="controls">
    <label>Timeframe: </label>
    <select (change)="updateHours($event)">
      <option value="6">6 Hours</option>
      <option value="12">12 Hours</option>
      <option value="24" selected>24 Hours</option>
      <option value="48">2 Days</option>
      <option value="168">1 Week</option>
      <option value="720">1 Month</option>
    </select>
  </div>
  <div class="profile-section" [class.fullscreen-mode]="isMaximized">
    <graph-component
      [measuredValueInput]="activeGraphMetric"
      [location]="location"
      [hours]="selectedHours()"
      (click)="toggleZoom()">
    </graph-component>
  </div>
}
